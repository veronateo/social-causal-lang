<!doctype html>
<meta charset="utf-8" />
<title>Exporter</title>
<base href="../../">
<style>
  html,body{margin:0;background:#fff}
  canvas{display:block; image-rendering: pixelated;}
</style>

<canvas id="c" width="512" height="512"></canvas>

<script>
/**
 * Puppeteer will:
 *  1) inject TRIALS (or TRIAL_DATA)
 *  2) inject grid-world-renderer.js, trial-generator.js, and export-adapter.js
 *  3) call window.__bootstrap(trialId, fps)
 */
(function () {
  const canvas = document.getElementById("c");
  const ctx    = canvas.getContext("2d", { alpha:false });

  window.__bootstrap = async function __bootstrap(trialId, fps) {
    const FPS = parseInt(fps || 20, 10);
    const DT  = 1000 / FPS;

    if (typeof window.__adapter?.create !== "function") {
      console.error("[export] Adapter missing. Did the recorder inject export-adapter.js?");
      return false;
    }

    const env = await window.__adapter.create({ trialId, canvas, ctx });
    if (!env) {
      console.error("[export] Adapter failed (no env).");
      return false;
    }

    // Deterministic stepping hook that Puppeteer will call
    const q=[];
    window.requestAnimationFrame = cb => (q.push(cb), 0);
    window.__tick = t => { const c=q.splice(0); c.forEach(cb=>cb(t)); };

    window.__exportStep = (i) => {
      window.__tick(i * DT);
      env.update(DT);
      env.render(ctx);
      return { done: !!env.isDone?.() };
    };

    console.log(`[export] bootstrapped trial=${trialId} @ ${FPS} fps`);
    return true;
  };
})();
</script>
